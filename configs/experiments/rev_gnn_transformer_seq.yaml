# configs/experiments/rev_gnn_transformer_seq.yaml
project:
  experiment_name: "rev_gnn_transformer_seq"
encoder:
  type: "graphsage"
  hidden_dim: 64
sequence_model:
  type: "transformer"
  n_heads: 4
  n_layers: 2
  ff_dim: 128
  dropout: 0.1
  max_seq_len: 2000
training:
  algorithm: "imitation+reinforce"
  imitation_epochs: 100
  reinforce_epochs: 100
